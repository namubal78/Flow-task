<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>파일 확장자 차단 - Flow</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Noto Sans KR', 'Malgun Gothic', sans-serif; background: #f0edf8; color: #2d2340; }

        /* ── GNB */
        .gnb { background: #5c3bc1; height: 52px; display: flex; align-items: center; padding: 0 32px; box-shadow: 0 2px 6px rgba(92,59,193,0.3); }
        .gnb-logo { color: #fff; font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
        .gnb-logo span { color: #c9b8ff; font-weight: 400; font-size: 13px; margin-left: 10px; }

        /* ── 레이아웃 */
        .page-wrap { max-width: 960px; margin: 32px auto; padding: 0 16px; }
        .layout { display: flex; gap: 20px; }

        /* ── 사이드바 */
        .sidebar { width: 180px; min-width: 180px; background: #fff; border-radius: 8px; border: 1px solid #e0d9f5; padding: 16px 0; height: fit-content; }
        .sidebar-title { font-size: 11px; font-weight: 700; color: #9b8ec4; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 16px 8px; }
        .sidebar-item { display: block; padding: 9px 16px; font-size: 13px; color: #555; cursor: pointer; border-left: 3px solid transparent; }
        .sidebar-item.active { color: #5c3bc1; font-weight: 700; border-left-color: #5c3bc1; background: #f5f1ff; }

        /* ── 메인 카드 */
        .container { flex: 1; background: #fff; border: 1px solid #e0d9f5; border-radius: 8px; padding: 28px 32px; box-shadow: 0 2px 8px rgba(92,59,193,0.06); }
        h2 { font-size: 17px; font-weight: 700; color: #2d2340; margin-bottom: 6px; padding-bottom: 14px; border-bottom: 2px solid #5c3bc1; }
        .header-desc { font-size: 13px; color: #7b6fa0; margin-bottom: 24px; padding-top: 8px; }

        /* ── 섹션 공통 */
        .section { display: flex; align-items: flex-start; gap: 24px; margin-bottom: 28px; }
        .section-label { width: 100px; min-width: 100px; font-size: 14px; font-weight: bold; padding-top: 6px; }
        .section-content { flex: 1; }

        /* ── 고정 확장자 */
        .fixed-list { display: flex; gap: 16px; flex-wrap: wrap; }
        .fixed-item { display: flex; align-items: center; gap: 4px; font-size: 14px; }
        .fixed-item input[type=checkbox] { width: 15px; height: 15px; cursor: pointer; }
        .fixed-item label { cursor: pointer; }
        .help-icon { display: inline-flex; align-items: center; justify-content: center; width: 16px; height: 16px; border-radius: 50%; background: #4A90D9; color: #fff; font-size: 10px; font-weight: bold; cursor: pointer; text-decoration: none; }

        /* ── 커스텀 인풋 줄 */
        .custom-input-row { display: flex; gap: 8px; margin-bottom: 8px; align-items: center; }
        .custom-input-row input[type=text] { height: 34px; padding: 0 10px; border: 1px solid #ccc; border-radius: 3px; font-size: 13px; width: 200px; }
        .custom-input-row .spacer { flex: 1; }

        /* ── 버튼 공통 */
        .btn { height: 34px; padding: 0 14px; border: none; border-radius: 3px; font-size: 13px; cursor: pointer; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-add  { background: #555; color: #fff; }
        .btn-gray { background: #888; color: #fff; }
        .btn-blue { background: #4A90D9; color: #fff; }

        /* ── 실시간 피드백 */
        .input-feedback { font-size: 12px; margin-top: 4px; min-height: 16px; }
        .feedback-ok    { color: #3aab5e; }
        .feedback-dup   { color: #d9534f; }
        .feedback-fixed { color: #e6a817; }

        /* ── textarea 래퍼 */
        .textarea-wrapper { position: relative; border: 1px solid #ccc; border-radius: 3px; margin-top: 8px; }

        /* 상단 툴바 */
        .textarea-toolbar { display: flex; justify-content: space-between; align-items: center; padding: 6px 10px; border-bottom: 1px solid #eee; background: #fafafa; gap: 8px; }
        .toolbar-left  { display: flex; align-items: center; gap: 8px; }
        .toolbar-right { display: flex; align-items: center; gap: 6px; }
        .count-text { font-size: 12px; color: #888; white-space: nowrap; }
        .btn-delete-all { height: 26px; padding: 0 10px; font-size: 12px; background: #666; color: #fff; border: none; border-radius: 3px; cursor: pointer; }
        .search-input { height: 26px; padding: 0 8px; font-size: 12px; border: 1px solid #ccc; border-radius: 3px; width: 160px; }
        .btn-search { height: 26px; padding: 0 12px; font-size: 12px; background: #d9534f; color: #fff; border: none; border-radius: 3px; cursor: pointer; }

        /* 정렬 바 */
        .sort-bar { font-size: 12px; color: #555; margin-bottom: 8px; display: flex; gap: 4px; align-items: center; padding: 8px 10px 0; }
        .sort-btn { background: none; border: none; cursor: pointer; font-size: 12px; color: #555; padding: 0; }
        .sort-btn.active { color: #333; font-weight: bold; }
        .sort-btn.underline { text-decoration: underline; }
        .sort-divider { color: #ccc; }

        /* 태그 목록 */
        .tag-area { height: 200px; overflow-y: auto; padding: 8px 10px 12px; }
        .tag-list { display: flex; flex-wrap: wrap; gap: 6px; min-height: 60px; }
        .tag { display: inline-flex; align-items: center; gap: 4px; padding: 4px 10px; background: #f0f0f0; border-radius: 14px; font-size: 13px; height: fit-content; transition: outline 0.2s; }
        .tag.highlight { outline: 2px solid #5c3bc1; background: #e8e0ff; }
        .tag .tag-del { background: none; border: none; cursor: pointer; font-size: 12px; color: #888; padding: 0; line-height: 1; }
        .tag .tag-del:hover { color: #d9534f; }
        .empty-msg { font-size: 12px; color: #bbb; padding: 12px 0; }

        /* ── 드롭존 */
        .drop-zone { border: 2px dashed #c5b8ef; border-radius: 6px; padding: 24px 16px; text-align: center; background: #faf8ff; cursor: pointer; transition: border-color 0.2s, background 0.2s; margin-bottom: 8px; }
        .drop-zone.drag-over { border-color: #5c3bc1; background: #f0ebff; }
        .drop-zone-text { font-size: 13px; color: #9b8ec4; margin-bottom: 10px; }
        .btn-file-attach { height: 32px; padding: 0 16px; background: #5c3bc1; color: #fff; border: none; border-radius: 3px; font-size: 13px; cursor: pointer; }
    </style>
</head>
<body>

<!-- GNB -->
<div class="gnb">
    <div class="gnb-logo">Flow <span>관리자 설정</span></div>
</div>

<!-- 페이지 래퍼 -->
<div class="page-wrap">
    <div class="layout">

        <!-- 사이드바 -->
        <nav class="sidebar">
            <div class="sidebar-title">시스템 설정</div>
            <div class="sidebar-item active">파일 확장자 차단</div>
        </nav>

        <!-- 메인 콘텐츠 -->
        <div class="container">
            <h2>&#9673; 파일 확장자 차단</h2>
            <p class="header-desc">파일확장자에 따라 특정 형식의 파일을 첨부하거나 전송하지 못하도록 제한합니다.</p>

            <!-- ── 고정 확장자 섹션 -->
            <div class="section">
                <div class="section-label">고정 확장자</div>
                <div class="section-content">
                    <div class="fixed-list" id="fixed-list">
                        <!-- JS로 렌더링 -->
                    </div>
                </div>
            </div>

            <!-- ── 커스텀 확장자 섹션 -->
            <div class="section" style="align-items:flex-start;">
                <div class="section-label">커스텀 확장자</div>
                <div class="section-content">

                    <!-- 엑셀 업로드용 hidden file input -->
                    <input type="file" id="excel-file-input" accept=".xlsx,.xls" style="display:none">

                    <!-- 인풋 + 추가 | (spacer) | 엑셀 업로드 + 양식 다운로드 -->
                    <div class="custom-input-row">
                        <input type="text" id="custom-input" placeholder="확장자 입력" maxlength="20">
                        <button class="btn btn-add" id="btn-add">+추가</button>
                        <div class="spacer"></div>
                        <button class="btn btn-blue" id="btn-excel-upload">엑셀 업로드</button>
                        <button class="btn btn-gray" id="btn-template-download">양식 다운로드</button>
                    </div>
                    <div class="input-feedback" id="input-feedback"></div>

                    <!-- textarea 영역 -->
                    <div class="textarea-wrapper">
                        <!-- 툴바 -->
                        <div class="textarea-toolbar">
                            <div class="toolbar-left">
                                <span class="count-text" id="count-display">0/200</span>
                                <button class="btn-delete-all" id="btn-delete-all">전체삭제</button>
                            </div>
                            <div class="toolbar-right">
                                <input type="text" class="search-input" id="search-input" placeholder="추가 목록 검색">
                                <button class="btn-search" id="btn-search">검색</button>
                            </div>
                        </div>

                        <!-- 정렬 바 -->
                        <div class="sort-bar">
                            <button class="sort-btn" id="sort-alpha">알파벳순 ↓</button>
                            <span class="sort-divider">|</span>
                            <button class="sort-btn active underline" id="sort-recent">최근등록순</button>
                        </div>

                        <!-- 태그 목록 (스크롤 영역) -->
                        <div class="tag-area" id="tag-area">
                            <div class="tag-list" id="tag-list"></div>
                        </div>
                    </div>

                </div>
            </div>
            <!-- ── 차단 테스트 섹션 -->
            <div class="section" style="align-items:flex-start;">
                <div class="section-label">차단 테스트</div>
                <div class="section-content">

                    <input type="file" id="test-file-input" multiple style="display:none">

                    <!-- 드롭존 -->
                    <div class="drop-zone" id="drop-zone">
                        <div class="drop-zone-text">파일을 드래그하여 추가하거나</div>
                        <button class="btn-file-attach" id="btn-file-attach">파일 첨부</button>
                    </div>

                    <!-- 파일 목록 영역 -->
                    <div class="textarea-wrapper">
                        <div class="textarea-toolbar">
                            <div class="toolbar-left">
                                <span class="count-text" id="file-count-display">0개 파일</span>
                                <button class="btn-delete-all" id="btn-file-delete-all">전체삭제</button>
                            </div>
                        </div>
                        <div class="tag-area" id="file-tag-area">
                            <div class="tag-list" id="file-tag-list"></div>
                        </div>
                    </div>

                </div>
            </div>

        </div><!-- /.container -->

    </div><!-- /.layout -->
</div><!-- /.page-wrap -->

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script>
$(function () {

    let currentSort = 'recent';

    // ─────────────────────────────────────────
    // 초기 로드
    // ─────────────────────────────────────────
    fetchAll();

    function fetchAll() {
        $.get('/api/extensions?sort=' + currentSort, function (res) {
            renderFixed(res.fixedExtensions);
            renderCustom(res.customExtensions, res.customCount);
        });
    }

    // ─────────────────────────────────────────
    // 렌더링 헬퍼
    // ─────────────────────────────────────────
    function renderFixed(fixedMap) {
        const $list = $('#fixed-list');
        $list.empty();
        Object.entries(fixedMap).forEach(([ext, checked]) => {
            const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(ext + ' 확장자란?');
            $list.append(`
                <div class="fixed-item">
                    <input type="checkbox" class="fixed-checkbox" id="ext-${ext}" data-ext="${ext}" ${checked ? 'checked' : ''}>
                    <label for="ext-${ext}">${ext}</label>
                    <a class="help-icon" href="${searchUrl}" target="_blank" title="${ext} 확장자란?">?</a>
                </div>
            `);
        });
    }

    function renderCustom(list, count) {
        updateCount(count);
        const $tagList = $('#tag-list');
        $tagList.empty();
        if (!list || list.length === 0) {
            $tagList.append('<span class="empty-msg">추가된 커스텀 확장자가 없습니다.</span>');
            return;
        }
        list.forEach(item => $tagList.append(createTag(item)));
    }

    function createTag(item) {
        const searchUrl = 'https://www.google.com/search?q=' + encodeURIComponent(item.extension + ' 확장자란?');
        return `
            <span class="tag" data-id="${item.id}" data-ext="${item.extension}">
                ${item.extension}
                <a class="help-icon" style="font-size:9px;" href="${searchUrl}" target="_blank" title="${item.extension} 확장자란?">?</a>
                <button class="tag-del" data-id="${item.id}" data-ext="${item.extension}">✕</button>
            </span>`;
    }

    function updateCount(count) {
        $('#count-display').text(count + '/200');
    }

    // ─────────────────────────────────────────
    // 2. 고정 확장자 체크 변경
    // ─────────────────────────────────────────
    $(document).on('change', '.fixed-checkbox', function () {
        const $cb     = $(this);
        const ext     = $cb.data('ext');
        const checked = $cb.prop('checked');
        $.ajax({
            url: '/api/extensions/fixed/' + ext,
            type: 'PATCH',
            data: { checked: checked },
            success: function () {
                alert('[' + ext + '] 확장자를 ' + (checked ? '추가했습니다.' : '삭제했습니다.'));
            },
            error: function () {
                alert('저장에 실패했습니다. 다시 시도해주세요.');
                $cb.prop('checked', !checked);  // 체크 상태 롤백
            }
        });
    });

    // ─────────────────────────────────────────
    // 4. 실시간 중복 체크 (300ms debounce)
    // ─────────────────────────────────────────
    let debounceTimer;
    $('#custom-input').on('input', function () {
        const val = $.trim($(this).val());
        clearTimeout(debounceTimer);
        if (!val) {
            setFeedback('', '');
            $('#btn-add').prop('disabled', false);
            return;
        }
        debounceTimer = setTimeout(function () {
            if (!/^[a-zA-Z0-9]+$/.test(val)) {
                setFeedback('영문자와 숫자만 입력 가능합니다', 'feedback-dup');
                $('#btn-add').prop('disabled', true);
                return;
            }
            $.get('/api/extensions/check', { ext: val }, function (res) {
                if (res.status === 'AVAILABLE') {
                    setFeedback(res.message, 'feedback-ok');
                    $('#btn-add').prop('disabled', false);
                } else if (res.status === 'DUPLICATE') {
                    setFeedback(res.message, 'feedback-dup');
                    $('#btn-add').prop('disabled', true);
                } else if (res.status === 'FIXED') {
                    setFeedback(res.message, 'feedback-fixed');
                    $('#btn-add').prop('disabled', true);
                    // 해당 고정 확장자 체크박스로 포커스
                    const $cb = $('#ext-' + val.toLowerCase());
                    if ($cb.length) $cb.focus();
                }
            });
        }, 300);
    });

    function setFeedback(msg, cls) {
        $('#input-feedback').text(msg).attr('class', 'input-feedback' + (cls ? ' ' + cls : ''));
    }

    // ─────────────────────────────────────────
    // 7. 커스텀 확장자 추가
    // ─────────────────────────────────────────
    $('#btn-add').on('click', function () {
        const val = $.trim($('#custom-input').val());
        if (!val) return;
        if (!/^[a-zA-Z0-9]+$/.test(val)) {
            setFeedback('영문자와 숫자만 입력 가능합니다', 'feedback-dup');
            $('#btn-add').prop('disabled', true);
            return;
        }

        $.ajax({
            url: '/api/extensions/custom',
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({ extension: val }),
            success: function (res) {
                $('#custom-input').val('');
                setFeedback('', '');
                $('#btn-add').prop('disabled', false);
                alert('[' + val + '] 확장자가 추가되었습니다.');  // alert 먼저 → OK 후 목록 갱신
                fetchCustomList();
            },
            error: function (xhr) {
                alert(xhr.responseJSON?.message || '추가에 실패했습니다.');
            }
        });
    });

    // Enter 키로도 추가
    $('#custom-input').on('keydown', function (e) {
        if (e.key === 'Enter') $('#btn-add').click();
    });

    // 포커스 아웃 시 입력값·피드백 초기화 (추가 버튼 클릭 시 제외)
    $('#custom-input').on('blur', function (e) {
        if (e.relatedTarget && $(e.relatedTarget).is('#btn-add')) return;
        clearTimeout(debounceTimer);
        $(this).val('');
        setFeedback('', '');
        $('#btn-add').prop('disabled', false);
    });

    // ─────────────────────────────────────────
    // 5. 양식 다운로드
    // ─────────────────────────────────────────
    $('#btn-template-download').on('click', function () {
        window.location.href = '/api/extensions/template';
    });

    // ─────────────────────────────────────────
    // 6. 엑셀 업로드
    // ─────────────────────────────────────────
    $('#btn-excel-upload').on('click', function () {
        $('#excel-file-input').click();
    });

    $('#excel-file-input').on('change', function () {
        const file = this.files[0];
        if (!file) return;

        if (!confirm('[' + file.name + '] 파일을 업로드하시겠습니까?')) {
            $('#excel-file-input').val('');
            return;
        }

        const formData = new FormData();
        formData.append('file', file);

        $.ajax({
            url: '/api/extensions/upload',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function (res) {
                alert(res.data.message);
                if (res.data.success) fetchCustomList();
            },
            error: function (xhr) {
                alert(xhr.responseJSON?.message || '업로드에 실패했습니다.');
            },
            complete: function () {
                $('#excel-file-input').val('');  // 같은 파일 재선택 가능하도록 초기화
            }
        });
    });

    // ─────────────────────────────────────────
    // 8. 목록 내 검색 → 스크롤 + 하이라이트
    // ─────────────────────────────────────────
    $('#btn-search').on('click', function () {
        const val = $.trim($('#search-input').val()).toLowerCase();
        if (!val) return;

        const $target = $('.tag[data-ext="' + val + '"]');
        if ($target.length) {
            const $area = $('#tag-area');
            const newScrollTop = $area.scrollTop() + $target.offset().top - $area.offset().top - 20;
            $area.animate({ scrollTop: newScrollTop }, 300, function () {
                $target.addClass('highlight');
                setTimeout(() => $target.removeClass('highlight'), 1500);
            });
        } else {
            alert('[' + val + '] 확장자는 목록에 없습니다.');
        }
        $('#search-input').val('');
    });

    $('#search-input').on('keydown', function (e) {
        if (e.key === 'Enter') $('#btn-search').click();
    });

    // ─────────────────────────────────────────
    // 9. 정렬
    // ─────────────────────────────────────────
    $('#sort-alpha').on('click', function () {
        currentSort = (currentSort === 'alpha_asc') ? 'alpha_desc' : 'alpha_asc';
        updateSortUI();
        fetchCustomList();
    });

    $('#sort-recent').on('click', function () {
        currentSort = 'recent';
        updateSortUI();
        fetchCustomList();
    });

    function updateSortUI() {
        const $alpha  = $('#sort-alpha');
        const $recent = $('#sort-recent');

        $alpha.removeClass('active underline');
        $recent.removeClass('active underline');

        if (currentSort === 'alpha_asc') {
            $alpha.text('알파벳순 ↓').addClass('active');
            $recent.addClass('underline');
        } else if (currentSort === 'alpha_desc') {
            $alpha.text('알파벳순 ↑').addClass('active');
            $recent.addClass('underline');
        } else {
            $alpha.text('알파벳순 ↓');
            $recent.addClass('active underline');
        }
    }

    // ─────────────────────────────────────────
    // 10. 전체 삭제
    // ─────────────────────────────────────────
    $('#btn-delete-all').on('click', function () {
        const countText = $('#count-display').text();
        const count = parseInt(countText);
        if (count === 0) { alert('삭제할 커스텀 확장자가 없습니다.'); return; }

        if (confirm('총 [' + count + ']개 커스텀 확장자 차단 정보를 삭제합니다.\n정말로 삭제하시겠습니까?')) {
            $.ajax({
                url: '/api/extensions/custom',
                type: 'DELETE',
                success: function () {
                    renderCustom([], 0);
                },
                error: function () {
                    alert('삭제에 실패했습니다. 다시 시도해주세요.');
                }
            });
        }
    });

    // ─────────────────────────────────────────
    // 11. 개별 삭제
    // ─────────────────────────────────────────
    $(document).on('click', '.tag-del', function () {
        const id  = $(this).data('id');
        const ext = $(this).data('ext');

        if (confirm('[' + ext + '] 차단 정보를 삭제합니다.\n정말로 삭제하시겠습니까?')) {
            $.ajax({
                url: '/api/extensions/custom/' + id,
                type: 'DELETE',
                success: function (res) {
                    updateCount(res.customCount);
                    fetchCustomList();
                },
                error: function () {
                    alert('삭제에 실패했습니다. 다시 시도해주세요.');
                }
            });
        }
    });

    // ─────────────────────────────────────────
    // 공통 - 커스텀 목록 재조회
    // ─────────────────────────────────────────
    function fetchCustomList() {
        $.get('/api/extensions/custom?sort=' + currentSort, function (res) {
            renderCustom(res.data, res.customCount);
        });
    }

    // ─────────────────────────────────────────
    // 차단 테스트 - 초기 파일 목록 조회
    // ─────────────────────────────────────────
    fetchFileList();

    function fetchFileList() {
        $.get('/api/files', function (res) {
            renderFileList(res);
        });
    }

    function renderFileList(list) {
        const $list = $('#file-tag-list');
        $list.empty();
        $('#file-count-display').text(list.length + '개 파일');
        if (!list || list.length === 0) {
            $list.append('<span class="empty-msg">업로드된 파일이 없습니다.</span>');
            return;
        }
        list.forEach(item => $list.append(createFileTag(item)));
    }

    function createFileTag(item) {
        return `<span class="tag" data-id="${item.id}">
            ${item.originalName} (${formatFileSize(item.fileSize)})
            <button class="file-del" data-id="${item.id}">✕</button>
        </span>`;
    }

    function formatFileSize(bytes) {
        if (bytes < 1024) return bytes + 'B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + 'KB';
        return (bytes / (1024 * 1024)).toFixed(1) + 'MB';
    }

    // ─────────────────────────────────────────
    // 차단 테스트 - 파일 선택 (버튼 / 드롭존 클릭)
    // ─────────────────────────────────────────
    $('#btn-file-attach').on('click', function (e) {
        e.stopPropagation();
        $('#test-file-input').click();
    });

    $('#drop-zone').on('click', function () {
        $('#test-file-input').click();
    });

    $('#test-file-input').on('change', function () {
        const files = this.files;
        if (!files || files.length === 0) return;
        uploadTestFiles(files);
        $(this).val('');
    });

    // ─────────────────────────────────────────
    // 차단 테스트 - 드래그 앤 드롭
    // ─────────────────────────────────────────
    const $dropZone = $('#drop-zone');

    $dropZone.on('dragover dragenter', function (e) {
        e.preventDefault();
        e.stopPropagation();
        $dropZone.addClass('drag-over');
    });

    $dropZone.on('dragleave dragend', function (e) {
        e.preventDefault();
        $dropZone.removeClass('drag-over');
    });

    $dropZone.on('drop', function (e) {
        e.preventDefault();
        e.stopPropagation();
        $dropZone.removeClass('drag-over');
        const files = e.originalEvent.dataTransfer.files;
        if (!files || files.length === 0) return;
        uploadTestFiles(files);
    });

    // ─────────────────────────────────────────
    // 차단 테스트 - 업로드 실행
    // ─────────────────────────────────────────
    function uploadTestFiles(files) {
        const formData = new FormData();
        for (let i = 0; i < files.length; i++) {
            formData.append('files', files[i]);
        }
        $.ajax({
            url: '/api/files/upload',
            type: 'POST',
            data: formData,
            processData: false,
            contentType: false,
            success: function (res) {
                alert(res.message);
                fetchFileList();
            },
            error: function (xhr) {
                alert(xhr.responseJSON?.message || '업로드에 실패했습니다.');
            }
        });
    }

    // ─────────────────────────────────────────
    // 차단 테스트 - 개별 삭제
    // ─────────────────────────────────────────
    $(document).on('click', '.file-del', function () {
        const id = $(this).data('id');
        if (!confirm('파일을 삭제하시겠습니까?')) return;
        $.ajax({
            url: '/api/files/' + id,
            type: 'DELETE',
            success: function () { fetchFileList(); },
            error: function () { alert('삭제에 실패했습니다.'); }
        });
    });

    // ─────────────────────────────────────────
    // 차단 테스트 - 전체 삭제
    // ─────────────────────────────────────────
    $('#btn-file-delete-all').on('click', function () {
        const countText = $('#file-count-display').text();
        const count = parseInt(countText);
        if (count === 0) { alert('삭제할 파일이 없습니다.'); return; }
        if (!confirm('업로드된 파일 ' + count + '개를 모두 삭제하시겠습니까?')) return;
        $.ajax({
            url: '/api/files',
            type: 'DELETE',
            success: function () { renderFileList([]); },
            error: function () { alert('삭제에 실패했습니다.'); }
        });
    });

});
</script>
</body>
</html>
